name: ci

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:
    branches: [main]
    types: [labeled, opened, synchronize, reopened]

permissions: write-all

jobs:
  build:
    name: release x86_64-unknown-linux-musl
    runs-on: ${{ github.repository == 'denoland/rusty_v8' && 'ubuntu-22.04-xl' || 'ubuntu-22.04' }}
    timeout-minutes: 180
    env:
      V8_FROM_SOURCE: true
      RUSTFLAGS: -D warnings
      TARGET: x86_64-unknown-linux-musl
      VARIANT: release
      LIB_NAME: librusty_v8
      LIB_EXT: a

    steps:
      - name: Configure git
        run: git config --global core.symlinks true

      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 10
          submodules: recursive

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11.x
          architecture: x64

      - name: Install musl toolchain
        run: |
          rustup target add ${{ env.TARGET }}

          sudo apt update
          sudo apt install -yq --no-install-suggests --no-install-recommends \
            musl musl-dev musl-tools

      - name: Build
        run: cargo build --all-targets --locked --target ${{ env.TARGET }} --release

      - name: Prepare binary publish
        run: |
          gzip -9c target/${{ env.TARGET }}/${{ env.VARIANT }}/gn_out/obj/${{ env.LIB_NAME }}.${{ env.LIB_EXT }} > target/${{ env.LIB_NAME }}_${{ env.VARIANT }}_${{ env.TARGET }}.${{ env.LIB_EXT }}.gz
          ls -l target/${{ env.LIB_NAME }}_${{ env.VARIANT }}_${{ env.TARGET }}.${{ env.LIB_EXT }}.gz

          cp target/${{ env.TARGET }}/${{ env.VARIANT }}/gn_out/src_binding.rs target/src_binding_${{ env.VARIANT }}_${{ env.TARGET }}.rs
          ls -l target/src_binding_${{ env.VARIANT }}_${{ env.TARGET }}.rs

      - name: Binary publish
        uses: softprops/action-gh-release@v0.1.15
        if: github.repository == 'cconger/rusty_v8' && startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            target/${{ env.LIB_NAME }}_${{ env.VARIANT }}_${{ env.TARGET }}.${{ env.LIB_EXT }}.gz
            target/src_binding_${{ env.VARIANT }}_${{ env.TARGET }}.rs

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: src_binding_${{ env.VARIANT }}_${{ env.TARGET }}.rs
          path: target/src_binding_${{ env.VARIANT }}_${{ env.TARGET }}.rs

  publish:
    needs: [build]
    runs-on: ${{ github.repository == 'denoland/rusty_v8' && 'ubuntu-22.04-xl' || 'ubuntu-22.04' }}
    if: github.repository == 'denoland/rusty_v8' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Configure git
        run: git config --global core.symlinks true

      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 10
          submodules: recursive

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11.x
          architecture: x64

      - name: Download CI artifacts
        uses: actions/download-artifact@v4
        with:
          path: gen
          pattern: src_binding_*.rs
          merge-multiple: true

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -vv --locked --allow-dirty
